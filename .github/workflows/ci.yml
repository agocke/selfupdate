name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SelfUpdater.slnx

      - name: Check formatting
        run: dotnet tool restore && dotnet csharpier check .

      - name: Build
        run: dotnet build SelfUpdater.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SelfUpdater.slnx -c Release --no-build --verbosity normal
