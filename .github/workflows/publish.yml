name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # "start release": tags the checked-in version, then publishes

permissions:
  contents: write   # to create the GitHub Release for the tag
  id-token: write   # to obtain the OIDC token for NuGet Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SourceLink can resolve the commit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version and tag
        id: version
        run: |
          # The package version is checked in (src/SelfUpdate/SelfUpdate.csproj), so
          # the build is deterministic. The tag is only a release pointer.
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/SelfUpdate/SelfUpdate.csproj)"
          if [ -z "$VERSION" ]; then
            echo "Could not read <Version> from src/SelfUpdate/SelfUpdate.csproj." >&2
            exit 1
          fi
          TAG="v$VERSION"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual start: refuse to re-release an existing version, then create the
            # tag in-run. A tag pushed with GITHUB_TOKEN does NOT retrigger this
            # workflow, so the current run proceeds straight to publishing (no double run).
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag '$TAG' already exists - bump <Version> in SelfUpdate.csproj before releasing." >&2
              exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          else
            # Tag-triggered: the pushed tag must match the checked-in version.
            if [ "$GITHUB_REF_NAME" != "$TAG" ]; then
              echo "Tag '$GITHUB_REF_NAME' does not match the checked-in version '$TAG'." >&2
              echo "Bump <Version> in SelfUpdate.csproj (or push the matching tag) and try again." >&2
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $TAG"

      - name: Restore
        run: dotnet restore SelfUpdate.slnx

      - name: Build
        run: >-
          dotnet build SelfUpdate.slnx -c Release --no-restore
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test SelfUpdate.slnx -c Release --no-build --verbosity normal

      - name: Pack
        run: >-
          dotnet pack src/SelfUpdate/SelfUpdate.csproj -c Release --no-build
          -o ${{ github.workspace }}/artifacts

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: agocke

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: >-
          gh release view "$TAG" >/dev/null 2>&1
          || gh release create "$TAG" --title "$TAG" --generate-notes
