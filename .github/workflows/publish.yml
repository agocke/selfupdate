name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # "start release": publishes the checked-in version, then tags it on success

permissions:
  contents: write   # to create the GitHub Release for the tag
  id-token: write   # to obtain the OIDC token for NuGet Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SourceLink can resolve the commit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        run: |
          # The package version is checked in (src/SelfUpdater/SelfUpdater.csproj), so
          # the build is deterministic. The tag is only a release pointer, and it is
          # created/pushed AFTER a successful publish (see the "Tag release" step) so a
          # failed run never leaves a dangling tag that blocks retries.
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/SelfUpdater/SelfUpdater.csproj)"
          if [ -z "$VERSION" ]; then
            echo "Could not read <Version> from src/SelfUpdater/SelfUpdater.csproj." >&2
            exit 1
          fi
          TAG="v$VERSION"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual start: refuse to re-release a version that's already been tagged
            # (the tag is written only on a successful publish, so an existing tag means
            # this version was already published).
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag '$TAG' already exists - bump <Version> in SelfUpdater.csproj before releasing." >&2
              exit 1
            fi
          else
            # Tag-triggered: the pushed tag must match the checked-in version.
            if [ "$GITHUB_REF_NAME" != "$TAG" ]; then
              echo "Tag '$GITHUB_REF_NAME' does not match the checked-in version '$TAG'." >&2
              echo "Bump <Version> in SelfUpdater.csproj (or push the matching tag) and try again." >&2
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $TAG"

      - name: Restore
        run: dotnet restore SelfUpdater.slnx

      - name: Build
        run: >-
          dotnet build SelfUpdater.slnx -c Release --no-restore
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test SelfUpdater.slnx -c Release --no-build --verbosity normal

      - name: Pack
        run: >-
          dotnet pack src/SelfUpdater/SelfUpdater.csproj -c Release --no-build
          -o ${{ github.workspace }}/artifacts

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: agocke

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate

      - name: Tag release
        # Only on manual start: the package is now published, so record the release
        # marker. A tag pushed with GITHUB_TOKEN does NOT retrigger this workflow, so
        # there is no double run. (On a tag-triggered run the tag already exists.)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: >-
          gh release view "$TAG" >/dev/null 2>&1
          || gh release create "$TAG" --title "$TAG" --generate-notes
