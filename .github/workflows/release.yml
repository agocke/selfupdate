name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # to create the GitHub Release for the tag

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SourceLink can resolve the commit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is not a valid SemVer (expected vMAJOR.MINOR.PATCH[-pre])." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore SelfUpdate.slnx

      - name: Build
        run: >-
          dotnet build SelfUpdate.slnx -c Release --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test SelfUpdate.slnx -c Release --no-build --verbosity normal

      - name: Pack
        run: >-
          dotnet pack src/SelfUpdate/SelfUpdate.csproj -c Release --no-build
          -p:Version=${{ steps.version.outputs.version }}
          -o ${{ github.workspace }}/artifacts

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "$NUGET_API_KEY"
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          ${{ github.workspace }}/artifacts/*.nupkg
          || gh release upload "$GITHUB_REF_NAME" ${{ github.workspace }}/artifacts/*.nupkg --clobber
